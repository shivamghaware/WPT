<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
</head>

<body>
    <center>
        <div class="container">
            <div class="jumbotron" style="background-color: rgb(183, 237, 219);">
                <h2>Users</h2>
            </div>
            <input type="button" class="btn btn-primary" value="GetData" onclick="getData()"
                style="margin-bottom: 10px;" />
        </div>
        <div class="container">
            <div class="col-md-10">
                <div class="table table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>FirstName</th>
                                <th>LastName</th>
                                <th>Image</th>
                            </tr>
                        </thead>
                        <tbody id="tablebody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </center>

    <script>
        function getData() {
            // 1. Fetch defaults to GET, so just pass the URL
            fetch("https://dummyjson.com/users")
                .then((response) => response.json()) // 2. Convert raw response to JSON
                .then((data) => {
                    // 3. Now 'data' is the actual object containing the 'users' array
                    var reftotablebody = document.getElementById("tablebody");
                    var rows = "";

                    for (var i = 0; i < data.users.length; i++) {
                        var user = data.users[i];
                        rows += `<tr>
                            <td>${user.firstName}</td>
                            <td>${user.lastName}</td>
                            <td>
                                <img src="${user.image}" class="img-fluid" style="height:70px; width:70px;">
                            </td>
                         </tr>`;
                    }
                    reftotablebody.innerHTML = rows;
                })
                .catch((error) => console.error("Error fetching users:", error));
        }
    </script>
</body>

</html>
