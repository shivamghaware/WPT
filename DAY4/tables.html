<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>

<body>
    <center>
        <h3>Table</h3>
        <br>
        <table border="1" width="500px" style="text-align: center">
            <tr>
                <td>1</td>
                <td>1</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td colspan="2">2</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td colspan="3">3</td>
                <td>1</td>
            </tr>
            <tr>
                <td rowspan="2">2</td>
                <td>1</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>1</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td colspan="2" rowspan="2">4</td>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
        </table>
    </center>
</body>

</html>
