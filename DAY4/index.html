<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubmitHere</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js"></script>
</head>

<body>
    <center>
        <h2>Enter Details</h2>
        <table id="formtable">
            <tr>
                <td >Name:</td>
                <td >
                    <input type="text" id="textName" />
                </td>
                <td >
                    <h5 class="error" id="errorForName"></h5>
                </td>
            </tr>
            <tr>
                <td>Email:</td>
                <td colspan="1" >
                    <input type="email" id="txtEmail" />
                </td>
                <td>
                    <h5 class="error" id="errorForEmail"></h5>
                </td>
            </tr>
            <tr>
                <td colspan="3" style="text-align:center">
                    <input id="submitbtn" type="button" value="submit" onclick="validate()">
                </td>
            </tr>
        </table>
        <hr>
        <p id="welcomeid"></p>
    </center>
    <script>
        function validate () {
            var refWelcomeMessage = document.getElementById("welcomeid");
            refWelcomeMessage.innerText = "";
            validateText("textName", "errorForName", "Enter Valid Name","welcomeid");
            validateText("txtEmail", "errorForEmail", "Enter Valid Email", "welcomeid");
        }
    </script>
</body>

</html>
